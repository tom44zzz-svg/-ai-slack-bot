        body: |
          告知として記載していない欠陥が見つかった場合には、修理費を支払う責任を負う可能性も。
          トラブルを回避するためにも、売買契約書の内容を事前に確認しておきましょう！
        highlight_phrases:
          - "修理費を支払う責任を負う可能性"
        footer: "SWIPE ▶"
      - page: "10/10"
        role: "CTA"
        title: "不動産やお金に関するお悩みは セゾンファンデックスが解決します！"
        visual: "家＋家族（父母＋子2人）のフラットイラスト"
        cta_button: "フォローお願いします！"
        top_hint: "▲ 他の投稿はこちらから"
        bottom_hint: "後で見返すために保存！"
    caption_structure:
      - "【保存版】タイトル"
      - "リード文（自己所有の不動産売却との違いに触れる）"
      - "【空き家を売る際にかかる費用】- 箇条書き詳細（仲介手数料・印紙代・抵当権抹消登記費用・譲渡所得税）"
      - "リフォーム・解体の注意喚起"
      - "【空き家の売却・活用サポート】（自社サービス紹介）"
      - "『— 保存して、チェックリストとしてご活用ください —』"
      - "▼アカウントプロフィールはこちらから @saisonfundex"
      - "区切り線"
      - "サービス全体の紹介（年間8.7万件以上の実績訴求）"
      - "区切り線"
      - "▼商品への問い合わせ URL 案内 / ▼貸付条件表 URL 案内"
      - "注意書き（投稿日時点の内容・公式HPで確認）"
      - "区切り線"
      - "ハッシュタグ（#セゾンファンデックス #空き家 #相続 #不動産売買）"
    notes: |
      - 10 枚中 4 枚（07/08/09/10）＋キャプションから分析。
      - 01〜06 は未受領だが、ページ番号バッジの連続性・番号付きタイトル（05→06→07）から
        「表紙 + 項目 01〜07 + CTA = 10枚」構成である可能性が極めて高い。
        ※ 表紙/目次の有無、導入スライドの枚数は要確認。
      - チェックリスト型として format_checklist に仮分類。

  # =========================================================================
  - id: post_shinsa_5
    date: null                      # 要確認
    canva_link: null                # 要確認（画像のみ受領）
    account: "セゾンファンデックス"
    topic_summary: "不動産担保ローン 審査に落ちてしまったときの対処法 5 選"
    total_slides: 9
    assigned_format: format_howto_n_sen
    observed_slides:
      - page: "01/09"
        role: "表紙"
        template: tpl_cover_category
        category_pill: "不動産担保ローン"
        main_title: "審査に落ちてしまったときの対処法5選"
        highlight_phrases: ["審査", "5"]
        visual: "LOAN APPLICATION 書類＋REJECTED スタンプ（半透明オーバーレイ）"
      - page: "02/09"
        role: "問題提起"
        template: tpl_problem_quote
        title: "多くの人がぶつかる「審査の壁」"
        quote: |
          「年収は500万円あるのに…」
          「不動産を持っているのに…」
        visual: "REJECTED スタンプ付きローン申込書を見て頭を抱える人物"
        summary: |
          審査に落ちてしまう原因は
          「年収額」や「資産額」だけではありません。
      - page: "03/09"
        role: "比較・導入"
        template: tpl_compare_2x3
        title: "審査に通りやすい人と通りにくい人の違い"
        compare_axes: ["収入・滞納歴", "借入状況", "書類"]
        compare_rows:
          通りやすい: ["収入が安定・滞納歴なし", "なし", "正確"]
          通りにくい: ["収入が不安定・滞納歴あり", "あり", "誤記入あり"]
        question: "審査に通るためにはどうすれば良い？"
        summary: "今回は、審査に落ちてしまった時の対処法5選をご紹介します。"
      - page: "04/09"
        role: "項目01"
        template: tpl_item_beforeafter
        item_number: "01"
        title: "担保物件を変える"
        comparison: ["担保価値の低い家", "担保価値の高い家"]
        summary: |
          より新しい物件や立地条件の良い物件に変更することで、
          担保価値を向上させることができます。
        highlight_phrases: ["担保価値を向上させる"]
        footer: "審査に落ちた時の対処法：02 ▶"
      - page: "05/09"
        role: "項目02"
        template: tpl_item_beforeafter    # label サブパターン（金額付き）
        item_number: "02"
        title: "融資希望額を減らす"
        comparison: ["5,000万円", "4,000万円"]
        summary: |
          融資額を減らすことで返済負担率が下がり、
          金融機関のリスク評価が改善される可能性があります。
        highlight_phrases: ["金融機関のリスク評価が改善される"]
        footer: "審査に落ちた時の対処法：03 ▶"
      - page: "06/09"
        role: "項目03"
        template: tpl_item_icons_3
        item_number: "03"
        title: "返済能力向上を示す（事業主）"
        icons_3:
          - "収入増加の見込み"
          - "支出の見直し"
          - "他の借入金の返済状況改善"
        summary: |
          具体的な施策と数値目標を通して返済能力の向上を明確に示すことで、
          再審査での承認可能性が高まることが期待できます。
        highlight_phrases: ["具体的な施策と数値目標"]
        footer: "審査に落ちた時の対処法：04 ▶"
      - page: "07/09"
        role: "項目04"
        template: tpl_item_persona_table
        item_number: "04"
        title: "別の金融機関に相談する"
        next_action: |
          金融機関によって審査の基準が異なるため、
          諦めずに複数の金融機関に相談してみましょう。
        diagram: "人物 → A社×／B社×／C社○"
        feature_table:
          メガバンク: "大規模な融資に強い。金利が低く審査基準は厳格。"
          地方銀行: "地域密着型で柔軟な対応に期待できる。"
          信用金庫: "中小企業や個人事業主向けの融資に強みがある。"
          ノンバンク: "銀行に比べて審査基準が緩やか。銀行で融資が難しくても利用できる可能性がある。"
        footer: "審査に落ちた時の対処法：05 ▶"
      - page: "08/09"
        role: "項目05"
        template: tpl_item_cards_3_caption_ref
        item_number: "05"
        title: "不動産担保ローン以外の選択肢を検討する"
        description: |
          不動産担保ローン以外の資金調達方法の一例として
          以下のような選択肢があります。
        cards_3: ["リースバック", "ABL(法人向け)", "公的融資制度"]
        caption_ref: "詳しくはキャプションに記載しています。"
        summary: |
          ただし、無理な借入は避け、
          自身の返済能力を冷静に判断することが何よりも大切です。
        highlight_phrases: ["冷静に判断すること"]
        footer: "SWIPE ▶"
      - page: "09/09"
        role: "CTA"
        template: tpl_cta_phone
        main_copy: |
          不動産やお金に関する
          お役立ち情報を発信中！
        follow_cta: "フォローして最新情報をGET！"
        save_hint: "いつでも見返せるように保存！"
    notes: |
      - 9 枚全て受領済み（Post 2 はコンプリート）。
      - 「表紙 + 問題提起 + 比較・導入 + 項目 ×5 + CTA = 9 枚」構成。
      - 項目 5 つがそれぞれ異なるテンプレ（before/after, icons_3, persona_table, cards_3）
        で構成されており、ネタの性質に応じて項目テンプレを選択していることが分かる。

