    account: "セゾンファンデックス"
    topic_summary: "【保存版】空き家売却 7 つのチェックリスト"
    total_slides: 10
    assigned_format: format_01
    observed_slides:                # 受領済みスライドのみ記録
      - page: "07/10"
        item_number: "05"
        title: "売却価格は相場を調べた上で設定する"
        visual: "コインの山＋家の木製フィギュア（背景：コンクリ壁）"
        body: |
          不動産会社の査定が正確とは限りません。
          同様の物件がいくらで売られているか、自分でも調べておくことが重要です！
        highlight_phrases:
          - "自分でも調べておくことが重要"
        footer: "⑥：査定は複数の不動産会社にお願いする ▶"
      - page: "08/10"
        item_number: "06"
        title: "査定は複数の不動産会社にお願いする"
        visual: "電卓＋家の積み木＋虫眼鏡（木目背景）"
        body: |
          不動産会社によって査定で重視するポイントは違います。
          複数の不動産会社に査定を依頼して、適切な価値を判断しましょう！
        highlight_phrases:
          - "査定で重視するポイント"
        footer: "⑦：不動産売買契約書を確認する ▶"
      - page: "09/10"
        item_number: "07"
