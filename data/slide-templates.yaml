# スライド単位の再利用テンプレ定義
#
# 考え方：
#   - 1 投稿は複数のスライドで構成される
#   - スライドには「役割別テンプレ」がある（表紙 / 問題提起 / 比較 / ... ）
#   - 投稿フォーマット（formats.yaml）は、これらテンプレの「組み合わせレシピ」として定義する
#
# スキーマ：
#   slide_templates:
#     - id: tpl_xxx                     # スネークケース、不変 ID
#       name: "日本語名"
#       role: "表紙 / 問題提起 / 比較 / 項目紹介 / ..."
#       structure:                       # 上から下への構成要素
#         - element: "..."               # 要素名
#           text_limit_chars: N          # 文字数上限（該当する場合）
#           max_lines: N                 # 行数上限
#           note: "..."                  # 補足
#       visuals:                         # 使う視覚要素
#         - "..."
#       used_in:                         # 観察された投稿の id
#         - post_xxx

slide_templates:

  # -----------------------------------------------------------
  # 1 枚目：表紙
  # -----------------------------------------------------------
  - id: tpl_cover_category
    name: "表紙・カテゴリ型"
    role: "表紙"
    structure:
      - element: "カテゴリピル（青背景・白文字）"
        text_limit_chars: 20
        max_lines: 2
        note: "投稿のカテゴリやキャッチコピー。例：『不動産担保ローン』"
      - element: "メインタイトル"
        chars_per_line: 7            # 1行 6〜7 文字
        max_lines: 5                 # 3〜5 行
        note: "強調したいキーワードは色変え or ハイライト（青など）"
      - element: "ロゴ（右下）"
        note: "セゾンファンデックス ロゴ。全投稿共通"
    visuals:
      - "背景写真（半透明オーバーレイ）"
    used_in:
      - post_shinsa_5           # 審査落ち対処法 5 選
      - post_souzoku_bunkatsu   # 実家相続 分割方法

  # -----------------------------------------------------------
  # 2 枚目想定：問題提起
  # -----------------------------------------------------------
  - id: tpl_problem_quote
    name: "問題提起・引用型"
    role: "問題提起"
    structure:
      - element: "見出し（青バー）"
        text_limit_chars: 20
      - element: "補足・例え（引用形式の台詞）"
        text_limit_chars: 40          # ※要確認：「340 字」は typo と推定し 30〜40 字で登録
        note: "『〜のに…』『〜なのに…』のような悩みの声を列挙"
      - element: "写真"
        note: "状況を表すストック写真"
      - element: "下部まとめテキスト（💡枠囲み）"
        text_limit_chars: 30
        note: "次ページ導入 or このページのまとめ"
    visuals:
      - "ストック写真"
      - "💡電球アイコン付き枠囲み"
    used_in:
      - post_shinsa_5           # 02/09「審査の壁」

  # -----------------------------------------------------------
  # 3 枚目想定：比較図解＋問い
  # -----------------------------------------------------------
  - id: tpl_compare_2x3
    name: "2 対象 × 3 要素 比較型"
    role: "比較・言語化"
    structure:
      - element: "見出し（青バー）"
        text_limit_chars: 20
      - element: "比較図解"
        note: |
          2 対象（例：通りやすい / 通りにくい）を 3 要素（例：収入・借入状況・書類）で比較。
          行×列のテーブル形式。アイコン or 人物イラストを 2 行の見出しに添える。
      - element: "問い（疑問形テキスト）"
        text_limit_chars: 20
        note: "例：『審査に通るためにはどうすれば良い？』"
      - element: "まとめ（💡枠囲み）"
        text_limit_chars: 30
        note: "今回の投稿の導入（『今回は〇〇をご紹介します』）"
    visuals:
      - "比較テーブル"
      - "アイコン / 人物イラスト"
    used_in:
      - post_shinsa_5           # 03/09

  # -----------------------------------------------------------
  # 項目スロット：before/after 2 イラスト比較
  # -----------------------------------------------------------
  - id: tpl_item_beforeafter
    name: "項目・before/after 比較型"
    role: "項目紹介"
    structure:
      - element: "項目番号バッジ（対処法XX 等）"
        note: "青の角丸。ハウススタイル固定"
      - element: "項目タイトル"
        text_limit_chars: 20
        max_lines: 2
      - element: "左右イラスト比較"
        note: |
          左＝before、右＝after（または低／高）。矢印で対比。
          金額などのラベルが付くサブバリエーションあり（tpl_item_beforeafter_label）。
      - element: "下部まとめ（💡枠囲み）"
        text_limit_chars: 40
    visuals:
      - "イラスト 2 つ + 矢印"
      - "💡枠囲み"
    used_in:
      - post_shinsa_5           # 04/09, 05/09

  # -----------------------------------------------------------
  # 項目スロット：3 アイコン並列
  # -----------------------------------------------------------
  - id: tpl_item_icons_3
    name: "項目・3 アイコン並列型"
    role: "項目紹介"
    structure:
      - element: "項目番号バッジ"
      - element: "項目タイトル"
        text_limit_chars: 20
        max_lines: 2
      - element: "3 アイコン並列カード"
        note: "各カード：見出し（7〜10字）＋アイコン"
      - element: "下部まとめ（💡枠囲み）"
        text_limit_chars: 50
        note: "イラストの解説 or このページのまとめ"
    visuals:
      - "アイコン付きカード×3"
      - "💡枠囲み"
    used_in:
      - post_shinsa_5           # 06/09「返済能力向上を示す（事業主）」

  # -----------------------------------------------------------
  # 項目スロット：人物＋丸抜き比較＋4 行特徴表
  # -----------------------------------------------------------
  - id: tpl_item_persona_table
    name: "項目・ネクストアクション＋丸抜き＋特徴表型"
    role: "項目紹介"
    structure:
      - element: "項目番号バッジ"
      - element: "項目タイトル"
        text_limit_chars: 20
      - element: "Next Action 提示文"
        text_limit_chars: 50
        note: "例：『金融機関によって審査の基準が異なるため、諦めずに複数の金融機関に相談してみましょう。』"
      - element: "丸抜き式図解"
        note: "人物 → 選択肢 A×, B×, C○ のように、◯×で正解／不正解を示す"
      - element: "4 行特徴表"
        note: "項目ラベル（青タグ）＋右側に解説 1 行。4 項目程度"
    visuals:
      - "人物アイコン"
      - "丸抜き(○×)比較"
      - "ラベル付き特徴表"
    used_in:
      - post_shinsa_5           # 07/09「別の金融機関に相談する」

  # -----------------------------------------------------------
  # 項目スロット：3 カード＋キャプション誘導
  # -----------------------------------------------------------
  - id: tpl_item_cards_3_caption_ref
    name: "項目・3 カード＋キャプション誘導型"
    role: "項目紹介"
    structure:
      - element: "項目番号バッジ"
      - element: "項目タイトル"
        text_limit_chars: 20
        max_lines: 2
      - element: "見出し下の説明文"
        text_limit_chars: 50
      - element: "3 選択肢カード"
        note: "アイコン＋ラベル。各ラベルは 10 字以内が目安"
      - element: "キャプション誘導文"
        text_limit_chars: 20
        note: "例：『詳しくはキャプションに記載しています。』"
      - element: "下部まとめ（💡枠囲み）"
        text_limit_chars: 50
        note: "このページのまとめ / 注意喚起"
    visuals:
      - "アイコン付きカード×3"
      - "💡枠囲み"
    used_in:
      - post_shinsa_5           # 08/09「不動産担保ローン以外の選択肢を検討する」

  # -----------------------------------------------------------
  # CTA スライド
  # -----------------------------------------------------------
  - id: tpl_cta_phone
    name: "CTA・スマホUI型"
    role: "CTA"
    structure:
      - element: "上部ロゴバー"
      - element: "メインコピー"
        text_limit_chars: 20
        max_lines: 2
        note: "例：『不動産やお金に関するお役立ち情報を発信中！』"
      - element: "スマホUI モックアップ（Instagram プロフィール画面）"
      - element: "フォロー誘導カード（黄色アクセント）"
        note: "『フォローして最新情報をGET！』"
      - element: "下部保存誘導"
        note: "『いつでも見返せるように保存！』＋ ブックマークアイコン"
    visuals:
      - "スマホモックアップ"
      - "ブックマークアイコン"
    used_in:
      - post_shinsa_5
      - post_souzoku_bunkatsu

  - id: tpl_cta_family
    name: "CTA・家族イラスト型"
    role: "CTA"
    structure:
      - element: "上部ヒント『▲ 他の投稿はこちらから』"
      - element: "メインコピー"
        text_limit_chars: 30
        max_lines: 2
      - element: "家族＋家のフラットイラスト"
      - element: "青ボタン『フォローお願いします！』"
      - element: "下部『後で見返すために保存！』"
    used_in:
      - post_akiya_checklist_7  # 10/10
